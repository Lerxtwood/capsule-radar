name: Deploy web installer

# Publishes web/flash/ to GitHub Pages.
#
# The installer publishes a copy of the latest GitHub Release full-flash binary:
#   CapsuleRadar-esp32s3.bin
# and the TamaPoke sprite bundle:
#   sprites.pak
#
# One-time setup in the repo:
#   Settings -> Pages -> Source = "GitHub Actions"

on:
  push:
    branches: [main]
    paths:
      - 'web/flash/**'
      - '.github/workflows/webflasher.yml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p site
          cp -R web/flash/. site/
          curl -L --fail \
            -o site/CapsuleRadar-esp32s3.bin \
            "https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/CapsuleRadar-esp32s3.bin"
          curl -L --fail \
            -o site/sprites.pak \
            "https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/sprites.pak"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
