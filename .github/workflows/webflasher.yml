name: Deploy web installer

# Publishes web/flash/ to GitHub Pages.
#
# The installer publishes copies of the latest GitHub Release install parts:
#   bootloader.bin
#   partition-table.bin
#   ota_data_initial.bin
#   CapsuleRadar-ota.bin
#   PrintSphere-ota.bin
#   capsule-radar-manifest.json
#   printsphere-manifest.json
# and the TamaPoke sprite bundle:
#   sprites.pak
#
# One-time setup in the repo:
#   Settings -> Pages -> Source = "GitHub Actions"

on:
  push:
    branches: [main]
    paths:
      - 'web/flash/**'
      - '.github/workflows/webflasher.yml'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p site
          cp -R web/flash/. site/
          curl -L --fail \
            -o site/bootloader.bin \
            "https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/bootloader.bin"
          curl -L --fail \
            -o site/partition-table.bin \
            "https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/partition-table.bin"
          curl -L --fail \
            -o site/ota_data_initial.bin \
            "https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/ota_data_initial.bin"
          curl -L --fail \
            -o site/CapsuleRadar-ota.bin \
            "https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/CapsuleRadar-ota.bin"
          curl -L --fail \
            -o site/PrintSphere-ota.bin \
            "https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/PrintSphere-ota.bin"
          curl -L --fail \
            -o site/capsule-radar-manifest.json \
            "https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/capsule-radar-manifest.json"
          curl -L --fail \
            -o site/printsphere-manifest.json \
            "https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/printsphere-manifest.json"
          curl -L --fail \
            -o site/sprites.pak \
            "https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/sprites.pak"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
