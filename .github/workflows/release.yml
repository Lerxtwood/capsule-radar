name: Release firmware

# Push a tag like v1.0.0 to build the companion firmware images and attach them
# to a GitHub Release. The browser web installer mirrors the bootloader,
# partition table, OTA data, both app-slot images, and sprites.pak from the
# latest release into GitHub Pages:
#   git tag v1.0.0 && git push origin v1.0.0

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout PrintSphere companion firmware
        uses: actions/checkout@v4
        with:
          repository: Lerxtwood/PrintSphere
          path: PrintSphere
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO + esptool
        run: pip install platformio esptool

      - name: Stamp shared release version
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"
          python - <<'PY'
          import os
          import re
          from pathlib import Path
          version = os.environ["VERSION"]
          path = Path("src/config.h")
          text = path.read_text()
          text = re.sub(r'#define FW_VERSION "[^"]+"',
                        f'#define FW_VERSION "{version}"',
                        text)
          path.write_text(text)
          PY

      - name: Build firmware
        run: pio run -e esp32-s3-amoled-175

      - name: Build PrintSphere companion firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32s3
          path: PrintSphere
          command: idf.py -D PRINTSPHERE_HW_VARIANT=amoled_1_75 -D PRINTSPHERE_RELEASE_VERSION=${{ github.ref_name }} build

      - name: Generate release note manifests
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          def run(args, cwd="."):
              return subprocess.check_output(args, cwd=cwd, text=True).strip()

          def subjects(args, cwd="."):
              try:
                  out = run(args, cwd=cwd)
              except subprocess.CalledProcessError:
                  out = ""
              notes = []
              for line in out.splitlines():
                  line = line.strip()
                  if line and line not in notes:
                      notes.append(line)
              return notes[:20]

          current_tag = os.environ.get("GITHUB_REF_NAME", "")
          previous_tag = ""
          try:
              tags = run(["git", "tag", "--sort=-creatordate"]).splitlines()
              for tag in tags:
                  if tag != current_tag:
                      previous_tag = tag
                      break
          except Exception:
              previous_tag = ""

          if previous_tag:
              capsule_notes = subjects(["git", "log", "--format=%s", f"{previous_tag}..HEAD"])
              previous_tag_date = run(["git", "log", "-1", "--format=%cI", previous_tag])
              printsphere_notes = subjects(["git", "log", "--format=%s", f"--since={previous_tag_date}"], cwd="PrintSphere")
          else:
              capsule_notes = subjects(["git", "log", "--format=%s", "-n", "20"])
              printsphere_notes = subjects(["git", "log", "--format=%s", "-n", "20"], cwd="PrintSphere")

          Path("capsule-radar-release-notes.json").write_text(json.dumps(capsule_notes, ensure_ascii=False))
          Path("printsphere-release-notes.json").write_text(json.dumps(printsphere_notes, ensure_ascii=False))
          print("Capsule release notes:", capsule_notes)
          print("PrintSphere release notes:", printsphere_notes)
          PY

      - name: Collect release assets
        run: |
          B=.pio/build/esp32-s3-amoled-175
          P=PrintSphere/build
          cp "$P/bootloader/bootloader.bin" bootloader.bin
          cp "$P/partition_table/partition-table.bin" partition-table.bin
          cp "$P/ota_data_initial.bin" ota_data_initial.bin
          cp "$B/firmware.bin" CapsuleRadar-ota.bin
          cp "$P/printsphere_idf.bin" PrintSphere-ota.bin
          curl -L --fail -o sprites.pak "https://socquique.github.io/TamaPoke/web/sprites.pak"
          TAG="${GITHUB_REF_NAME}"
          CAPSULE_SHA="$(sha256sum CapsuleRadar-ota.bin | awk '{print $1}')"
          CAPSULE_SIZE="$(stat -c%s CapsuleRadar-ota.bin)"
          PRINTSPHERE_SHA="$(sha256sum PrintSphere-ota.bin | awk '{print $1}')"
          PRINTSPHERE_SIZE="$(stat -c%s PrintSphere-ota.bin)"
          CAPSULE_NOTES="$(cat capsule-radar-release-notes.json)"
          PRINTSPHERE_NOTES="$(cat printsphere-release-notes.json)"
          BUILT_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > capsule-radar-manifest.json <<EOF
          {
            "version": "${TAG#v}",
            "board": "esp32-s3-amoled-175",
            "slot": "ota_0",
            "offset": 1114112,
            "firmware": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/CapsuleRadar-ota.bin",
            "sha256": "${CAPSULE_SHA}",
            "size": ${CAPSULE_SIZE},
            "commit": "${GITHUB_SHA::7}",
            "builtAtUtc": "${BUILT_AT}",
            "releaseNotes": ${CAPSULE_NOTES}
          }
          EOF
          cat > printsphere-manifest.json <<EOF
          {
            "version": "${TAG#v}",
            "board": "esp32-s3-amoled-175",
            "slot": "ota_1",
            "offset": 6356992,
            "firmware": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/PrintSphere-ota.bin",
            "sha256": "${PRINTSPHERE_SHA}",
            "size": ${PRINTSPHERE_SIZE},
            "commit": "${GITHUB_SHA::7}",
            "builtAtUtc": "${BUILT_AT}",
            "releaseNotes": ${PRINTSPHERE_NOTES}
          }
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bootloader.bin
            partition-table.bin
            ota_data_initial.bin
            CapsuleRadar-ota.bin
            PrintSphere-ota.bin
            capsule-radar-manifest.json
            printsphere-manifest.json
            sprites.pak
          generate_release_notes: true
          body: |
            **First flash (USB/browser):** use the web installer. It installs the companion layout and both app slots:
            - `bootloader.bin` at `0x0`
            - `partition-table.bin` at `0x8000`
            - `ota_data_initial.bin` at `0x109000`
            - `CapsuleRadar-ota.bin` at `0x110000`
            - `PrintSphere-ota.bin` at `0x610000`

            - Browser, no toolchain: https://lerxtwood.github.io/capsule-radar/
            - Or: `esptool.py --chip esp32s3 write_flash 0x0 bootloader.bin 0x8000 partition-table.bin 0x109000 ota_data_initial.bin 0x110000 CapsuleRadar-ota.bin 0x610000 PrintSphere-ota.bin`

            **Firmware updates:** use the browser web installer above. The firmware pages can check the latest release, but installs are handled by the web installer so all slots stay consistent.

            **TamaPoke sprites:** `sprites.pak` — optional SD-card sprite bundle used by the browser installer.


      - name: Prepare web installer site
        run: |
          mkdir -p site
          cp -R web/flash/. site/
          cp bootloader.bin site/bootloader.bin
          cp partition-table.bin site/partition-table.bin
          cp ota_data_initial.bin site/ota_data_initial.bin
          cp CapsuleRadar-ota.bin site/CapsuleRadar-ota.bin
          cp PrintSphere-ota.bin site/PrintSphere-ota.bin
          cp capsule-radar-manifest.json site/capsule-radar-manifest.json
          cp printsphere-manifest.json site/printsphere-manifest.json
          cp sprites.pak site/sprites.pak

      - name: Upload web installer artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy web installer
        id: deployment
        uses: actions/deploy-pages@v4
