name: Release firmware

# Push a tag like v1.0.0 to build the merged firmware and attach it to a GitHub
# Release. The browser web installer mirrors CapsuleRadar-esp32s3.bin from the
# latest release into GitHub Pages, the sprite installer mirrors sprites.pak,
# and the device OTA updater consumes CapsuleRadar-ota.bin plus manifest.json:
#   git tag v1.0.0 && git push origin v1.0.0

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO + esptool
        run: pip install platformio esptool

      - name: Build firmware
        run: pio run -e esp32-s3-amoled-175

      - name: Merge into a single flashable binary
        run: |
          B=.pio/build/esp32-s3-amoled-175
          BOOT_APP0="$(find "$HOME/.platformio/packages" -name boot_app0.bin -path '*framework-arduinoespressif32*' | head -1)"
          python -m esptool --chip esp32s3 merge_bin -o CapsuleRadar-esp32s3.bin \
            --flash_mode dio --flash_freq 80m --flash_size 16MB \
            0x0     "$B/bootloader.bin" \
            0x8000  "$B/partitions.bin" \
            0xe000  "$BOOT_APP0" \
            0x10000 "$B/firmware.bin"
          cp "$B/firmware.bin" CapsuleRadar-ota.bin   # app-only image for the device's web OTA page
          curl -L --fail -o sprites.pak "https://socquique.github.io/TamaPoke/web/sprites.pak"
          OTA_SHA="$(sha256sum CapsuleRadar-ota.bin | awk '{print $1}')"
          OTA_SIZE="$(stat -c%s CapsuleRadar-ota.bin)"
          TAG="${GITHUB_REF_NAME}"
          cat > manifest.json <<EOF
          {
            "version": "${TAG#v}",
            "board": "esp32-s3-amoled-175",
            "firmware": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/CapsuleRadar-ota.bin",
            "sha256": "${OTA_SHA}",
            "size": ${OTA_SIZE},
            "commit": "${GITHUB_SHA::7}",
            "builtAtUtc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CapsuleRadar-esp32s3.bin
            CapsuleRadar-ota.bin
            manifest.json
            sprites.pak
          generate_release_notes: true
          body: |
            **First flash (USB):** `CapsuleRadar-esp32s3.bin` — the full merged image (offset `0x0`).
            - Browser, no toolchain: https://lerxtwood.github.io/capsule-radar/
            - Or: `esptool.py --chip esp32s3 write_flash 0x0 CapsuleRadar-esp32s3.bin`

            **Update over WiFi (no cable):** `CapsuleRadar-ota.bin` — the app-only image.
            Open `http://capsuleradar.local/update` on the device and upload this file.
            (Do **not** upload the merged image there.)

            **TamaPoke sprites:** `sprites.pak` — optional SD-card sprite bundle used by the browser installer.

