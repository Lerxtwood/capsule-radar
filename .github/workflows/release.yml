name: Release firmware

# Push a tag like v1.0.0 to build the companion firmware images and attach them
# to a GitHub Release. The browser web installer mirrors the bootloader,
# partition table, OTA data, both app-slot images, and sprites.pak from the
# latest release into GitHub Pages:
#   git tag v1.0.0 && git push origin v1.0.0

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout PrintSphere companion firmware
        uses: actions/checkout@v4
        with:
          repository: Lerxtwood/PrintSphere
          path: PrintSphere

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO + esptool
        run: pip install platformio esptool

      - name: Build firmware
        run: pio run -e esp32-s3-amoled-175

      - name: Build PrintSphere companion firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32s3
          path: PrintSphere
          command: idf.py -D PRINTSPHERE_HW_VARIANT=amoled_1_75 build

      - name: Collect release assets
        run: |
          B=.pio/build/esp32-s3-amoled-175
          P=PrintSphere/build
          cp "$P/bootloader/bootloader.bin" bootloader.bin
          cp "$P/partition_table/partition-table.bin" partition-table.bin
          cp "$P/ota_data_initial.bin" ota_data_initial.bin
          cp "$B/firmware.bin" CapsuleRadar-ota.bin
          cp "$P/printsphere_idf.bin" PrintSphere-ota.bin
          curl -L --fail -o sprites.pak "https://socquique.github.io/TamaPoke/web/sprites.pak"
          TAG="${GITHUB_REF_NAME}"
          CAPSULE_SHA="$(sha256sum CapsuleRadar-ota.bin | awk '{print $1}')"
          CAPSULE_SIZE="$(stat -c%s CapsuleRadar-ota.bin)"
          PRINTSPHERE_SHA="$(sha256sum PrintSphere-ota.bin | awk '{print $1}')"
          PRINTSPHERE_SIZE="$(stat -c%s PrintSphere-ota.bin)"
          BUILT_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cat > capsule-radar-manifest.json <<EOF
          {
            "version": "${TAG#v}",
            "board": "esp32-s3-amoled-175",
            "slot": "ota_0",
            "offset": 1114112,
            "firmware": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/CapsuleRadar-ota.bin",
            "sha256": "${CAPSULE_SHA}",
            "size": ${CAPSULE_SIZE},
            "commit": "${GITHUB_SHA::7}",
            "builtAtUtc": "${BUILT_AT}"
          }
          EOF
          cat > printsphere-manifest.json <<EOF
          {
            "version": "${TAG#v}",
            "board": "esp32-s3-amoled-175",
            "slot": "ota_1",
            "offset": 6356992,
            "firmware": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/PrintSphere-ota.bin",
            "sha256": "${PRINTSPHERE_SHA}",
            "size": ${PRINTSPHERE_SIZE},
            "commit": "${GITHUB_SHA::7}",
            "builtAtUtc": "${BUILT_AT}"
          }
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bootloader.bin
            partition-table.bin
            ota_data_initial.bin
            CapsuleRadar-ota.bin
            PrintSphere-ota.bin
            capsule-radar-manifest.json
            printsphere-manifest.json
            sprites.pak
          generate_release_notes: true
          body: |
            **First flash (USB/browser):** use the web installer. It installs the companion layout and both app slots:
            - `bootloader.bin` at `0x0`
            - `partition-table.bin` at `0x8000`
            - `ota_data_initial.bin` at `0x109000`
            - `CapsuleRadar-ota.bin` at `0x110000`
            - `PrintSphere-ota.bin` at `0x610000`

            - Browser, no toolchain: https://lerxtwood.github.io/capsule-radar/
            - Or: `esptool.py --chip esp32s3 write_flash 0x0 bootloader.bin 0x8000 partition-table.bin 0x109000 ota_data_initial.bin 0x110000 CapsuleRadar-ota.bin 0x610000 PrintSphere-ota.bin`

            **Firmware updates:** use the browser web installer above. The firmware pages can check the latest release, but installs are handled by the web installer so all slots stay consistent.

            **TamaPoke sprites:** `sprites.pak` — optional SD-card sprite bundle used by the browser installer.

